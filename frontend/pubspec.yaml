name: careerlens
description: AI-powered job application tracker

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Navigation
  go_router: ^14.2.2

  # HTTP
  dio: ^5.6.0

  # File picker
  file_picker: ^8.1.2

  # UI
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
